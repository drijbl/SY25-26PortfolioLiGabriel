<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Rating</title>
<style>
  :root {
    --lightest: #e6f9fb;
    --light: #c3e7eb;
    --medium: #99d2db;
    --dark: #066a8c;
    --text-dark: #111;
  }

  body {
    font-family: Arial, sans-serif;
    background-color: var(--lightest);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    color: var(--text-dark);
    margin: 20px 0;
  }

  .movie-form {
    background-color: var(--light);
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 410px;
  }

  .movie-form h2 {
    text-align: center;
    margin-bottom: 20px;
    color: var(--dark);
  }

  .movie-form label {
    display: block;
    margin: 10px 0 5px 0;
    color: var(--text-dark);
    font-weight: bold;
  }

  .movie-form input, 
  .movie-form select {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--medium);
    border-radius: 5px;
    font-size: 14px;
    color: var(--text-dark);
    background-color: #fff;
    box-sizing: border-box;
  }

  .stars {
    display: flex;
    margin: 10px 0;
    cursor: pointer;
  }

  .stars span {
    font-size: 25px;
    color: #ccc;
    margin-right: 5px;
    transition: color 0.2s;
  }

  .stars span.selected {
    color: gold;
  }

  .movie-form button {
    width: 100%;
    padding: 10px;
    background-color: var(--dark);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    margin-top: 15px;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .movie-form button:hover {
    background-color: var(--medium);
  }

  .movie-list {
    margin-top: 20px;
    padding-top: 10px;
  }

  .movie-list h3 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 15px;
    color: var(--dark);
  }

  .movie-item {
    margin-bottom: 10px;
    padding: 10px 15px;
    background-color: var(--medium);
    border-radius: 5px;
    color: rgb(33, 8, 199);
    display: flex;
    justify-content: flex-start; 
    align-items: center;
    box-sizing: border-box;
    white-space: nowrap;
    overflow-x: auto;
    flex-wrap: wrap;
  }

 .movie-item button {
    margin-left: 8px;       
    padding: 2px 5px;      
    font-size: 12px;        
    line-height: 1;       
    height: auto;
    border-radius: 3px;
    cursor: pointer;
    color: white;
    border: none;
    width: auto;
    flex: 0 0 auto;
  }

  .movie-item button:hover {
    background-color: #d32f2f;
  }

  .movie-item span {
    color: gold; 
    margin-left: 2px; 
  }
</style>
</head>
<body>

<div class="movie-form">
  <h2>Add a Movie</h2>
  <label for="title">Title:</label>
  <input type="text" id="title">

  <label for="year">Year:</label>
  <input type="number" id="year">

  <label for="genre">Genre:</label>
  <select id="genre">
    <option>Action</option>
    <option>Comedy</option>
    <option>Drama</option>
    <option>Horror</option>
    <option>Fantasy</option>
  </select>

  <label>Rating:</label>
  <div class="stars">
    <span data-value="1">&#9733;</span>
    <span data-value="2">&#9733;</span>
    <span data-value="3">&#9733;</span>
    <span data-value="4">&#9733;</span>
    <span data-value="5">&#9733;</span>
  </div>

  <button id="addMovie">Add Movie</button>

  <div class="movie-list" id="movieList">
    <h3>Movie List</h3>
  </div>
</div>

<script>
const stars = document.querySelectorAll('.stars span');
let rating = 0;

// Star selection
stars.forEach(star => {
  star.addEventListener('click', () => {
    rating = star.dataset.value;
    stars.forEach(s => s.classList.remove('selected'));
    for(let i=0;i<rating;i++){
      stars[i].classList.add('selected');
    }
  });
});

const addMovieButton = document.getElementById('addMovie');
const movieList = document.getElementById('movieList');

// Add movie to localStorage
addMovieButton.addEventListener('click', () => {
  const title = document.getElementById('title').value.trim();
  const year = document.getElementById('year').value.trim();
  const genre = document.getElementById('genre').value;

  if(title && year && genre && rating > 0){
    let movies = JSON.parse(localStorage.getItem('movies') || '[]');

    // Find an existing movie with the same title (case-insensitive)
    const index = movies.findIndex(m => m.title.toLowerCase() === title.toLowerCase());

    if(index !== -1){
      // Update: changes movie information if the title already exists
      movies[index].year = year;
      movies[index].genre = genre;
      movies[index].rating = Math.round((Number(movies[index].rating) + Number(rating)) / 2);
    } else {
      // Create: adds a new movie if the title does not exist
      movies.push({title, year, genre, rating});
    }

    localStorage.setItem('movies', JSON.stringify(movies));
    displayMovies();
  }
});

// Lists movies from localStorage
function displayMovies(){
  movieList.innerHTML = '<h3>Movie List</h3>';
  const movies = JSON.parse(localStorage.getItem('movies') || '[]');

  movies.forEach((m, index) => {
    const div = document.createElement('div');
    div.className = 'movie-item';

    const textNode = document.createTextNode(`${m.title} (${m.year}) - ${m.genre}, Rating:`);
    
    const starsNode = document.createElement('span');
    starsNode.textContent = '★'.repeat(m.rating);

    // Delete button
    const deleteBtn = document.createElement('button');
    deleteBtn.textContent = 'Delete';
    deleteBtn.style.marginLeft = '10px';

    deleteBtn.addEventListener('click', () => {
      const confirmDelete = confirm(`Delete "${m.title}"?`);

      if(confirmDelete){
        let movies = JSON.parse(localStorage.getItem('movies') || '[]');
        movies.splice(index, 1); // remove item
        localStorage.setItem('movies', JSON.stringify(movies));
        displayMovies(); // refresh list
      }
    });

    div.appendChild(textNode);
    div.appendChild(starsNode);
    div.appendChild(deleteBtn);

    movieList.appendChild(div);
  });
}

displayMovies();
</script>

</body>
</html>
